name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

defaults:
  run:
    shell: bash

jobs:
  build:
    name: ${{ matrix.os }} target on ${{ matrix.on }}
    runs-on: ${{ matrix.on }}
    strategy:
      matrix:
        os: [ Linux, macOS, Windows ]
        on: [ ubuntu-24.04, macos-15 ]
        exclude:
          - os: Linux
            on: macos-15
          - os: macOS
            on: ubuntu-24.04
    steps:
    - name: Set build params
      id: cfg
      env:
        cstandard: -std=gnu2${{ runner.os == 'macOS' && 'x' || '3' }}
        baseflags: -flto=full -O3 -Wall -Wextra -Wpedantic -Weverything -DNDEBUG=1
        archflags: ${{ matrix.os == 'macOS' && '' || ' -fuse-ld=lld' }}${{ matrix.os == 'Linux' && ' -march=x86-64-v3 -mtune=znver3' || '' }}
      run: |
        printf '%s=%s\n' \
               ${{ matrix.os == runner.os && 'native' || 'cross' }} ${{ matrix.os }} \
               cc clang${{ runner.os == 'macOS' && '' || '-21' }} \
               cflags "${{ env.cstandard }} ${{ env.baseflags }}${{ env.archflags }}" \
               exe dbs26${{ matrix.os == 'Windows' && '.exe exe2 cl-dbs26.exe' || '' }} \
               pkg dbs26-${{ matrix.os }} \
               src "args.c dbs26.c" >> "$GITHUB_OUTPUT"
    - name: Update system packages
      env:
        Linux: |
          ${{ matrix.os == 'Windows' && 'sudo mkdir -pm755 /etc/apt/keyrings
          wget -qO- https://dl.winehq.org/wine-builds/winehq.key | \
          sudo gpg --dearmor -o /etc/apt/keyrings/winehq-archive.key -
          wget -qO- https://dl.winehq.org/wine-builds/ubuntu/dists/noble/winehq-noble.sources | \
          sudo tee /etc/apt/sources.list.d/winehq.sources
          sudo dpkg --add-architecture i386' || '' }}
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble main" | \
          sudo tee /etc/apt/sources.list.d/apt.llvm.org.list
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | \
          sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo apt-get update
          sudo apt-get upgrade -y
        macOS: |
          set +e
          brew update
          brew upgrade
          brew install bash
      run: |
        ${{ runner.os == 'Linux' && env.Linux || '' }}
        ${{ runner.os == 'macOS' && env.macOS || '' }}
    - name: Set env variables
      id: env
      env:
        exe: ${{ steps.cfg.outputs.exe }}
        exe2: ${{ steps.cfg.outputs.exe2 }}
      run: |
        ${{ steps.cfg.outputs.cross == 'Windows' && '
        [[ "$__msvc_path"     ]] || __msvc_path="msvc"
        [[ "$__msvc_sdk_path" ]] || __msvc_sdk_path="$__msvc_path/sdk"
        [[ "$__msvc_dir"      ]] || __msvc_dir="$GITHUB_WORKSPACE/$__msvc_path"
        [[ "$__msvc_sdk_dir"  ]] || __msvc_sdk_dir="$__msvc_dir/sdk"
        [[ "$__msvc_bin_dir"  ]] || __msvc_bin_dir="$__msvc_sdk_dir/bin/x64"
        printf "%s=%s\n" \
               wine "WINEDEBUG=-all wine64 " \
               msvc_dir "$__msvc_dir" \
               msvc_sdk_dir "$__msvc_sdk_dir" \
               msvc_bin_dir "$__msvc_bin_dir" >> "$GITHUB_OUTPUT"
        ' || '' }}
        [[ "$__build_dir" ]] || __build_dir="$GITHUB_WORKSPACE/build"
        printf "%s=%s\n" \
               build_dir "$__build_dir" \
               built_exe "$__build_dir/$exe" \
               ${{ env.exe2 && 'built_exe2 "$__build_dir/$exe2" ' || '' }} >> "$GITHUB_OUTPUT"

    - uses: actions/checkout@v4

    - name: Clone msvc-wine
      if: ${{ steps.env.outputs.wine }}
      uses: actions/checkout@v4
      with:
        repository: mstorsjo/msvc-wine
        path: ${{ steps.env.outputs.msvc_dir }}
        ref: master

    - name: Install dependencies
      env:
        msvc_dir: ${{ steps.env.outputs.msvc_dir }}
        msvc_sdk_dir: ${{ steps.env.outputs.msvc_sdk_dir }}
        msvc_bin_dir: ${{ steps.env.outputs.msvc_bin_dir }}
      run: |
        ${{ runner.os == 'Linux' && 'sudo apt-get install -y clang clang-21 lld lld-21 llvm-21-linker-tools' || '' }}${{ steps.env.outputs.wine && runner.os == 'Linux' && ' \
                     ca-certificates msitools python3 winbind winehq-staging' || '' }}${{ runner.os == 'macOS' && 'set +e
        brew install coreutils gnu-sed' || '' }}${{ steps.env.outputs.wine && runner.os == 'macOS' && ' msitools wine@staging' || '' }}
        ${{ runner.os == 'macOS' && 'printf -vP "$(brew --prefix)/opt/%s/libexec/gnubin:" gnu-sed coreutils
        echo "PATH=$P$PATH" >> "$GITHUB_ENV"' || '' }}
        ${{ steps.env.outputs.wine && 'mkdir -p "$msvc_sdk_dir"
        "$msvc_dir/vsdownload.py" --accept-license --dest "$msvc_sdk_dir"
        "$msvc_dir/install.sh" "$msvc_sdk_dir"' || '' }}

    - name: Introspect compilers
      run: |
        set +e
        uname -a
        printf -- '\n+---------+\n|compilers|\n+---------+\n'
        . .github/workflows/functions.bash
        get_compilers
        declare -a cc_clang cc_gcc
        declare -A cc_v
        for _cc in "${compilers[@]}"; do
          v=$("$_cc" --version 2>&1 | head -1)
          case "$_cc" in
          clang*)
            cc_clang+=("$_cc") ;;
          gcc*)
            [[ ! "$v" =~ clang ]] || continue
            cc_gcc+=("$_cc") ;;
          esac
          cc_v["$_cc"]="$v"
        done
        n=$(printf '%s\n' "${cc_v[@]}" | wc -L)
        for _cc in "${cc_clang[@]}"; do
          printf "%-${n}s\t%s\n" "${cc_v[$_cc]}" "$_cc"
        done | tee compilers_clang
        for _cc in "${cc_gcc[@]}"; do
          printf "%-${n}s\t%s\n" "${cc_v[$_cc]}" "$_cc"
        done | tee compilers_gcc

    - name: Compile
      working-directory: ${{ github.workspace }}/src
      env:
        build_dir: ${{ steps.env.outputs.build_dir }}
        Linux: |
          "${{ steps.cfg.outputs.cc }}" ${{ steps.cfg.outputs.cflags }} -o "$build_dir/${{ steps.cfg.outputs.exe }}" ${{ steps.cfg.outputs.src }}
          strip --strip-all "$build_dir/${{ steps.cfg.outputs.exe }}"
        macOS: |
          "${{ steps.cfg.outputs.cc }}" -arch arm64 ${{ steps.cfg.outputs.cflags }} -o "$build_dir/${{ steps.cfg.outputs.exe }}-arm64" ${{ steps.cfg.outputs.src }}
          "${{ steps.cfg.outputs.cc }}" -arch x86_64 ${{ steps.cfg.outputs.cflags }} -o "$build_dir/${{ steps.cfg.outputs.exe }}-x86_64" ${{ steps.cfg.outputs.src }}
          lipo -create -output "$build_dir/${{ steps.cfg.outputs.exe }}" "$build_dir/${{ steps.cfg.outputs.exe }}-arm64" "$build_dir/${{ steps.cfg.outputs.exe }}-x86_64"
        Windows: |
          BIN="${{ steps.env.outputs.msvc_bin_dir }}" . "${{ steps.env.outputs.msvc_bin_dir }}/msvcenv-native.sh"
          export PATH="${{ steps.env.outputs.msvc_bin_dir }}:$PATH"
          "${{ steps.cfg.outputs.cc }}" --target=x86_64-windows-msvc ${{ steps.cfg.outputs.cflags }} -o "$build_dir/${{ steps.cfg.outputs.exe }}" ${{ steps.cfg.outputs.src }}
          cl /nologo /TC /std:clatest /experimental:c11atomics /DNDEBUG=1 /Wall /O2 /Oi /GL /GF /Zo- /favor:AMD64 /arch:AVX2 /MT /Fe: "$build_dir/${{ steps.cfg.outputs.exe2 }}" ${{ steps.cfg.outputs.src }}
      run: |
        mkdir -p "$build_dir"
        ${{ steps.cfg.outputs.native == 'Linux' && env.Linux || '' }}
        ${{ steps.cfg.outputs.native == 'macOS' && env.macOS || '' }}
        ${{ steps.cfg.outputs.cross == 'Windows' && env.Windows || '' }}

    - name: Package
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.cfg.outputs.pkg }}
        path: |
          ${{ steps.env.outputs.built_exe }}
          ${{ steps.env.outputs.built_exe2 }}
          LICENSE
          README.md

    - name: Validate
      working-directory: ${{ steps.env.outputs.build_dir }}
      env:
        Linux: |
          ${{ matrix.os == 'Linux' && 'try ./' || '' }}${{ matrix.os == 'Linux' && steps.cfg.outputs.exe || '' }}
        macOS: |
          ${{ matrix.os == 'macOS' && 'try arch -arm64 ./' || '' }}${{ matrix.os == 'macOS' && steps.cfg.outputs.exe || '' }}
          ${{ matrix.os == 'macOS' && 'try arch -x86_64 ./' || '' }}${{ matrix.os == 'macOS' && steps.cfg.outputs.exe || '' }}
        Windows: |
          ${{ matrix.os == 'Windows' && 'try ./' || '' }}${{ matrix.os == 'Windows' && steps.cfg.outputs.exe || '' }}
          ${{ matrix.os == 'Windows' && 'try ./' || '' }}${{ matrix.os == 'Windows' && steps.cfg.outputs.exe2 || '' }}
      run: |
        try() {
          local f="$RUNNER_TEMP/test.bin"
          ${{ steps.env.outputs.wine }}"$@" -o -   | sha1sum     ; rm -f "$f"
          ${{ steps.env.outputs.wine }}"$@" -o "$f"; sha1sum "$f"; rm -f "$f"
        }
        ${{ matrix.os == 'Linux' && env.Linux || '' }}
        ${{ matrix.os == 'macOS' && env.macOS || '' }}
        ${{ matrix.os == 'Windows' && env.Windows || '' }}
