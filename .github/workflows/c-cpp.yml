name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

defaults:
  run:
    shell: bash

jobs:
  build:
    name: ${{ matrix.os }} target on ${{ matrix.on }}
    runs-on: ${{ matrix.on }}
    strategy:
      fail-fast: false
      matrix:
        os: [ Linux, macOS, Windows ]
        on: [ ubuntu-24.04, macos-15, macos-14 ]
        exclude:
          - os: Linux
            on: macos-15
          - os: Linux
            on: macos-14
          - os: macOS
            on: ubuntu-24.04
    steps:
    - name: id
      id: id
      env:
        native_: ${{ matrix.os == runner.os && 'native_' || '' }}
        cross_: ${{ matrix.os != runner.os && 'cross_' || '' }}
        native_on: ${{ matrix.os == runner.os && matrix.on || '' }}
        native: ${{ matrix.os == runner.os && matrix.os || '' }}
        cross: ${{ matrix.os != runner.os && matrix.os || '' }}
        cross_os: ${{ matrix.os != runner.os && runner.os || '' }}
        cross_on: ${{ matrix.os != runner.os && matrix.on || '' }}
        kind: ${{ matrix.os == runner.os && matrix.on || runner.os }}
      run: |
        printf '%s\n' \
               "os_on=${{ matrix.os }}_${{ matrix.on }}" \
               "os_os=${{ matrix.os }}_${{ runner.os }}" \
               "${{ matrix.os }}_${{ matrix.on }}=${{ env.cross && 'cross' || 'native' }}" \
               "${{ matrix.os }}_${{ runner.os }}=${{ env.cross_ }}${{ matrix.os }}" \
               "${{ env.cross_ }}${{ matrix.os }}=${{ env.kind }}" \
               "${{ matrix.os == runner.os && 'native' || 'cross' }}=${{ matrix.os }}" >> "$GITHUB_OUTPUT"
    - name: Set build params
      id: cfg
      env:
        cc: ${{ runner.os == 'macOS' && 'clang' || 'clang-21' }}
        cl: ${{ matrix.os == 'Windows' && 'cl' || '' }}
        ccl: ${{ steps.id.outputs.Windows_Linux && 'clang-cl-21' || '' }}
        baseflags: -std=gnu2${{ runner.os == 'macOS' && 'x' || '3' }} -flto=full -O3 -Wall -Wextra -Wpedantic -Weverything -DNDEBUG=1
        archflags: ${{ matrix.os != 'macOS' && ' -fuse-ld=lld' || '' }}${{ matrix.os == 'Linux' && ' -march=x86-64-v3 -mtune=znver3' || '' }}
        ext: ${{ matrix.os == 'Windows' && '.exe' || '' }}
      run: |
        printf '%s\n' \
               cc=${{ env.cc }} ${{ env.cl && 'cl=' || '' }}${{ env.cl }} ${{ env.ccl && 'ccl=' || '' }}${{ env.ccl }} \
               cflags="${{ env.baseflags }}${{ env.archflags }}" \
               exe=dbs26-${{ env.cc }}${{ env.ext }} \
               ${{ env.cl && 'exe_cl=dbs26-' || '' }}${{ env.cl }}${{ env.cl && env.ext || '' }} \
               ${{ env.ccl && 'exe_ccl=dbs26-' || '' }}${{ env.ccl }}${{ env.ccl && env.ext || '' }} \
               pkg=dbs26-${{ steps.id.outputs.cross && steps.id.outputs.os_on || matrix.on }} \
               src="args.c dbs26.c" >> "$GITHUB_OUTPUT"
    - name: Update system packages
      env:
        Linux: |
          ${{ steps.id.outputs.Windows_Linux && 'sudo mkdir -pm755 /etc/apt/keyrings
          wget -qO- https://dl.winehq.org/wine-builds/winehq.key | \
          sudo gpg --dearmor -o /etc/apt/keyrings/winehq-archive.key -
          wget -qO- https://dl.winehq.org/wine-builds/ubuntu/dists/noble/winehq-noble.sources | \
          sudo tee /etc/apt/sources.list.d/winehq.sources
          sudo dpkg --add-architecture i386' || '' }}
          ${{ runner.os == 'Linux' && '
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble main" | \
          sudo tee /etc/apt/sources.list.d/apt.llvm.org.list
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | \
          sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo apt-get update
          sudo apt-get upgrade -y' || '' }}
        macOS: |
          ${{ runner.os == 'macOS' && 'set +e
          brew update
          brew upgrade
          brew install bash' || '' }}
      run: |
        ${{ runner.os == 'Linux' && env.Linux || '' }}
        ${{ runner.os == 'macOS' && env.macOS || '' }}
    - name: Set env variables
      id: env
      run: |
        ${{ steps.id.outputs.cross == 'Windows' && '
        [[ "$msvc_path" ]] || msvc_path="msvc"
        [[ "$msvc_dir"  ]] || msvc_dir="$GITHUB_WORKSPACE/$msvc_path"
        [[ "$msvc_sdk"  ]] || msvc_sdk="$msvc_dir/sdk"
        wine_cmd=wine64
        command -v wine64 >/dev/null || wine_cmd=wine
        printf "%s=%s\n" \
               wine "WINEDEBUG=-all $wine_cmd " \
               msvc_dir "$msvc_dir" \
               msvc_sdk "$msvc_sdk" \
               msvc_bin "$msvc_sdk/bin/x64" >> "$GITHUB_OUTPUT"
        ' || '' }}
        [[ "$build_dir" ]] || build_dir="$GITHUB_WORKSPACE/build"
        printf "%s=%s\n" \
               build_dir "$build_dir" \
               artifacts "$build_dir/${{ steps.cfg.outputs.exe }}${{ steps.cfg.outputs.exe_cl && ' $build_dir/' || '' }}${{ steps.cfg.outputs.exe_cl }}${{ steps.cfg.outputs.exe_ccl && ' $build_dir/' || '' }}${{ steps.cfg.outputs.exe_ccl }}" >> "$GITHUB_OUTPUT"

    - uses: actions/checkout@v4

    - name: Clone msvc-wine
      if: ${{ steps.env.outputs.wine }}
      uses: actions/checkout@v4
      with:
        repository: mstorsjo/msvc-wine
        path: ${{ steps.env.outputs.msvc_dir }}
        ref: master

    - name: Install dependencies
      env:
        msvc_dir: ${{ steps.env.outputs.msvc_dir }}
        msvc_sdk: ${{ steps.env.outputs.msvc_sdk }}
      run: |
        ${{ runner.os == 'Linux' && '
        sudo apt-get install -y clang clang-21 lld \
                     lld-21 llvm-21-linker-tools' || '' }}${{ steps.id.outputs.Windows_Linux && ' \
                     ca-certificates msitools python3 winbind winehq-staging' || '' }}

        ${{ runner.os == 'macOS' && 'set +e' || '' }}
        ${{ steps.id.outputs.Windows_macOS && 'brew install msitools wine@staging' || '' }}

        ${{ steps.env.outputs.wine && 'mkdir -p "$msvc_sdk"
        "$msvc_dir/vsdownload.py" --accept-license --dest "$msvc_sdk"
        "$msvc_dir/install.sh" "$msvc_sdk"' || '' }}

        ${{ runner.os == 'macOS' && 'brew install coreutils gnu-sed' || '' }}${{ steps.id.outputs.Windows_macOS && ' llvm lld binutils' || '' }}
        ${{ runner.os == 'macOS' && 'PFX="$(brew --prefix)"
        PATH="$PFX/opt/gnu-sed/libexec/gnubin:$PATH"
        PATH="$PFX/opt/coreutils/libexec/gnubin:$PATH"' || '' }}
        ${{ steps.id.outputs.Windows_macOS && '
        PATH="$PFX/opt/binutils/bin:$PATH"
        PATH="$PFX/opt/llvm/bin:$PATH"' || '' }}
        ${{ runner.os == 'macOS' && 'echo "PATH=$PATH" >> "$GITHUB_ENV"' || '' }}

    - name: Introspect compilers
      run: |
        set +e
        uname -a
        printf -- '\n+---------+\n|compilers|\n+---------+\n'
        . .github/workflows/functions.bash
        get_compilers
        declare -a cc_clang cc_gcc
        declare -A cc_v
        for _cc in "${compilers[@]}"; do
          v=$("$_cc" --version 2>&1 | head -1)
          case "$_cc" in
          clang*)
            cc_clang+=("$_cc") ;;
          gcc*)
            [[ ! "$v" =~ clang ]] || continue
            cc_gcc+=("$_cc") ;;
          esac
          cc_v["$_cc"]="$v"
        done
        n=$(printf '%s\n' "${cc_v[@]}" | wc -L)
        for _cc in "${cc_clang[@]}"; do
          printf "%-${n}s\t%s\n" "${cc_v[$_cc]}" "$_cc"
        done | tee compilers_clang
        for _cc in "${cc_gcc[@]}"; do
          printf "%-${n}s\t%s\n" "${cc_v[$_cc]}" "$_cc"
        done | tee compilers_gcc

    - name: Compile
      working-directory: ${{ github.workspace }}/src
      env:
        build_dir: ${{ steps.env.outputs.build_dir }}
        native_Linux: |
          "${{ steps.cfg.outputs.cc }}" ${{ steps.cfg.outputs.cflags }} -o "$build_dir/${{ steps.cfg.outputs.exe }}" ${{ steps.cfg.outputs.src }}
          strip --strip-all "$build_dir/${{ steps.cfg.outputs.exe }}"
        native_macOS: |
          "${{ steps.cfg.outputs.cc }}" -arch arm64 ${{ steps.cfg.outputs.cflags }} -o "$build_dir/${{ steps.cfg.outputs.exe }}-arm64" ${{ steps.cfg.outputs.src }}
          "${{ steps.cfg.outputs.cc }}" -arch x86_64 ${{ steps.cfg.outputs.cflags }} -o "$build_dir/${{ steps.cfg.outputs.exe }}-x86_64" ${{ steps.cfg.outputs.src }}
          lipo -create -output "$build_dir/${{ steps.cfg.outputs.exe }}" "$build_dir/${{ steps.cfg.outputs.exe }}-arm64" "$build_dir/${{ steps.cfg.outputs.exe }}-x86_64"
        cross_Windows: |
          BIN="${{ steps.env.outputs.msvc_bin }}" . "${{ steps.env.outputs.msvc_dir }}/msvcenv-native.sh"
          export PATH="${{ steps.env.outputs.msvc_bin }}:$PATH"
          echo "\"${{ steps.cfg.outputs.cc }}\" --target=$TARGET_TRIPLE ${{ steps.cfg.outputs.cflags }} -o \"$build_dir/${{ steps.cfg.outputs.exe }}\" ${{ steps.cfg.outputs.src }}"
          "${{ steps.cfg.outputs.cc }}" --target=$TARGET_TRIPLE ${{ steps.cfg.outputs.cflags }} -o "$build_dir/${{ steps.cfg.outputs.exe }}" ${{ steps.cfg.outputs.src }}
          echo "\"${{ steps.cfg.outputs.cl }}\" /TC /std:clatest /experimental:c11atomics /DNDEBUG=1 /Wall /O2 /Oi /GL /GF /Zo- /MT /Fe: \"$build_dir/${{ steps.cfg.outputs.exe_cl }}\" ${{ steps.cfg.outputs.src }}"
          "${{ steps.cfg.outputs.cl }}" /TC /std:clatest /experimental:c11atomics /DNDEBUG=1 /Wall /O2 /Oi /GL /GF /Zo- /MT /Fe: "$build_dir/${{ steps.cfg.outputs.exe_cl }}" ${{ steps.cfg.outputs.src }}
        post_Windows_Linux:
          echo "\"${{ steps.cfg.outputs.ccl }}\" /TC /DNDEBUG=1 /Wall /O2 /Oi /GF /Zo- /MT /Fe: \"$build_dir/${{ steps.cfg.outputs.exe_ccl }}\" -fuse-ld=lld ${{ steps.cfg.outputs.src }}"
          "${{ steps.cfg.outputs.ccl }}" /TC /DNDEBUG=1 /Wall /O2 /Oi /GF /Zo- /MT /Fe: "$build_dir/${{ steps.cfg.outputs.exe_ccl }}" -fuse-ld=lld ${{ steps.cfg.outputs.src }}
      run: |
        mkdir -p "$build_dir"
        ${{ steps.id.outputs.native == 'Linux' && env.Linux || '' }}
        ${{ steps.id.outputs.native == 'macOS' && env.macOS || '' }}
        ${{ steps.id.outputs.cross == 'Windows' && env.Windows || '' }}

    - name: Package
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.cfg.outputs.pkg }}
        path: |
          ${{ steps.env.outputs.artifacts }}
          LICENSE
          README.md

    - name: Validate
      working-directory: ${{ steps.env.outputs.build_dir }}
      env:
        Linux: |
          ${{ matrix.os == 'Linux' && 'try ./' || '' }}${{ matrix.os == 'Linux' && steps.cfg.outputs.exe || '' }}
        macOS: |
          ${{ matrix.os == 'macOS' && 'try arch -arm64 ./' || '' }}${{ matrix.os == 'macOS' && steps.cfg.outputs.exe || '' }}
          ${{ matrix.os == 'macOS' && 'try arch -x86_64 ./' || '' }}${{ matrix.os == 'macOS' && steps.cfg.outputs.exe || '' }}
        Windows: |
          ${{ matrix.os == 'Windows' && 'try ./' || '' }}${{ matrix.os == 'Windows' && steps.cfg.outputs.exe || '' }}
          ${{ matrix.os == 'Windows' && 'try ./' || '' }}${{ matrix.os == 'Windows' && steps.cfg.outputs.exe_cl || '' }}
          ${{ matrix.os == 'Windows' && 'try ./' || '' }}${{ matrix.os == 'Windows' && steps.cfg.outputs.exe_ccl || '' }}
      run: |
        try() {
          local f="$RUNNER_TEMP/test.bin"
          ${{ steps.env.outputs.wine }}"$@" -o -   | sha1sum     ; rm -f "$f"
          ${{ steps.env.outputs.wine }}"$@" -o "$f"; sha1sum "$f"; rm -f "$f"
        }
        ${{ matrix.os == 'Linux' && env.Linux || '' }}
        ${{ matrix.os == 'macOS' && env.macOS || '' }}
        ${{ matrix.os == 'Windows' && env.Windows || '' }}
