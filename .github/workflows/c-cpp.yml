name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

defaults:
  run:
    shell: bash

jobs:
  build:
    name: ${{ matrix.os }} target on ${{ matrix.on }}
    runs-on: ${{ matrix.on }}
    strategy:
      fail-fast: false
      matrix:
        os: [ Linux, macOS, Windows ]
        on: [ ubuntu-24.04, macos-15, macos-14 ]
        exclude:
          - os: Linux
            on: macos-15
          - os: Linux
            on: macos-14
          - os: macOS
            on: ubuntu-24.04
    steps:
    - name: Set build identity
      id: id
      env:
        on_: ${{ matrix.os != runner.os && 'on_' || '' }}${{ matrix.os != runner.os && runner.os || '' }}
        _for_: ${{ matrix.os != runner.os && '_for_' || '' }}${{ matrix.os != runner.os && matrix.os || '' }}
        _on_: ${{ matrix.os != runner.os && '=on_' || '' }}${{ matrix.os != runner.os && runner.os || '' }}
        type: ${{ matrix.os == runner.os && 'native' || 'cross' }}
      run: |
        printf '%s\n' ${{ env.on_ }}${{ env._for_ }}${{ env._on_ }}${{ env._for_ }} \
               on_${{ runner.os }}=on_${{ runner.os }} \
               for_${{ matrix.os }}=for_${{ matrix.os }} \
               ${{ env.type }}_${{ matrix.os }}=${{ env.type }}_${{ matrix.os }} \
               ${{ env.type }}=${{ env.type }} >> "$GITHUB_OUTPUT"

    - name: Configure build
      id: cfg
      env:
        pre_update_on_Linux_for_Windows: |
          sudo mkdir -pm755 /etc/apt/keyrings
          wget -qO- https://dl.winehq.org/wine-builds/winehq.key | \
          sudo gpg --dearmor -o /etc/apt/keyrings/winehq-archive.key -
          wget -qO- https://dl.winehq.org/wine-builds/ubuntu/dists/noble/winehq-noble.sources | \
          sudo tee /etc/apt/sources.list.d/winehq.sources
          sudo dpkg --add-architecture i386
        update_on_Linux: |
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble main" | \
          sudo tee /etc/apt/sources.list.d/apt.llvm.org.list
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | \
          sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo apt-get update
          sudo apt-get upgrade -y
        update_on_macOS: |
          brew update
          brew upgrade
          brew install bash

        pre_depends_on_Linux: |
          sudo apt-get install -y clang clang-21 lld lld-21 llvm-21-linker-tools
        pre_depends_on_Linux_for_Windows: |
          sudo apt-get install -y ca-certificates msitools python3 winbind winehq-staging
        pre_depends_on_macOS_for_Windows: |
          brew install msitools wine@staging
        depends_cross_Windows: |
          mkdir -p "$MSVC_SDK"
          "$MSVC_DIR/vsdownload.py" --accept-license --dest "$MSVC_SDK"
          "$MSVC_DIR/install.sh" "$MSVC_SDK"
        post_depends_on_macOS: |
          brew install coreutils gnu-sed
          P="$(brew --prefix)/opt"
          echo "$P/coreutils/libexec/gnubin:$P/gnu-sed/libexec/gnubin" >> "$GITHUB_PATH"
        post_depends_on_macOS_for_Windows: |
          brew install llvm lld binutils
          P="$(brew --prefix)/opt"
          echo "$P/llvm/bin:$P/opt/binutils/bin" >> "$GITHUB_PATH"

        compile_native_Linux: |
          "$CC" $CFLAGS -o "$EXE" $SRC
          strip --strip-all "$EXE"
        compile_native_macOS: |
          "$CC" -arch arm64 $CFLAGS -o "$EXE-arm64" $SRC
          "$CC" -arch x86_64 $CFLAGS -o "$EXE-x86_64" $SRC
          lipo -create -output "$EXE" "$EXE-arm64" "$EXE-x86_64"
        compile_cross_Windows: |
          BIN="$MSVC_BIN" . "$MSVC_DIR/msvcenv-native.sh"
          export PATH="$MSVC_BIN:$PATH"
          "$CC" --target=$TARGET_TRIPLE $CFLAGS -o "$EXE" $SRC
          "$CL" /TC /std:clatest /experimental:c11atomics /DNDEBUG=1 /Wall /O2 /Oi /GL /GF /Zo- /MT /nologo /Fe: "$EXE_CL" $SRC
        post_compile_on_Linux_for_Windows: |
          "$CCL" /TC /DNDEBUG=1 /Wall /O2 /Oi /GF /Zo- /MT /Fe: "$EXE_CCL" -fuse-ld=lld --nologo $SRC

        pre_validate_on_macOS_for_Windows: |
          try() {
            WINEDEBUG=-all wine "$@" -o -     | sha1sum       ; rm -f "$OUT"
            WINEDEBUG=-all wine "$@" -o "$OUT"; sha1sum "$OUT"; rm -f "$OUT"
          }
        pre_validate_cross_Windows: |
          try() {
            WINEDEBUG=-all wine64 "$@" -o -     | sha1sum       ; rm -f "$OUT"
            WINEDEBUG=-all wine64 "$@" -o "$OUT"; sha1sum "$OUT"; rm -f "$OUT"
          }
        pre_validate_native: |
          try() {
            "$@" -o -     | sha1sum       ; rm -f "$OUT"
            "$@" -o "$OUT"; sha1sum "$OUT"; rm -f "$OUT"
          }
        validate_native_Linux: |
          try "./$EXE"
        validate_native_macOS: |
          try arch -arm64 "./$EXE"
          try arch -x86_64 "./$EXE"
        validate_cross_Windows: |
          try "./$EXE"
          try "./$EXE_CL"
        post_validate_on_Linux_for_Windows: |
          try "./$EXE_CCL"

        ARCH_CFLAGS: ${{ ! steps.id.outputs.for_macOS && ' -fuse-ld=lld' || '' }}${{ steps.id.outputs.for_Linux && ' -march=x86-64-v3 -mtune=znver3' || '' }}
        BASE_CFLAGS: -std=gnu2${{ steps.id.outputs.on_macOS && 'x' || '3' }} -flto=full -O3 -Wall -Wextra -Wpedantic -Weverything -DNDEBUG=1
        BUILD_DIR: ${{ github.workspace }}/build
        BUILD_JOB: ${{ steps.id.outputs.cross && matrix.os || '' }}${{ steps.id.outputs.cross && '_' || '' }}${{ matrix.on }}
        BUILD_TYPE: ${{ steps.id.outputs.cross }}${{ steps.id.outputs.native }}
        CC: ${{ steps.id.outputs.on_macOS && 'clang' || 'clang-21' }}
        CCL: ${{ steps.id.outputs.on_Linux_for_Windows && 'clang-cl-21' || '' }}
        CL: ${{ steps.id.outputs.for_Windows && 'cl' || '' }}
        DEST_DIR: ${{ github.workspace }}/dest
        EXT: ${{ steps.id.outputs.for_Windows && '.exe' || '' }}
        MSVC: ${{ steps.id.outputs.cross_Windows && 'msvc' || '' }}
        SRC: args.c dbs26.c

        on_for: |
          f="${x}_on_${{ runner.os }}_for_${{ matrix.os }}"; y="${!f}"
          [[ -z "${y// /}" ]] || { echo "$y"; continue; }

      run: |
        printf '%s\n' \
               abs_exe="$BUILD_DIR/dbs26-${CC##*/}$EXT" \
               ${CCL:+abs_exe_ccl="$BUILD_DIR/dbs26-${CCL##*/}$EXT"} \
               ${CL:+abs_exe_cl="$BUILD_DIR/dbs26-${CL##*/}$EXT"} \
               build_dir="$BUILD_DIR" \
               build_job="$BUILD_JOB" \
               build_type="$BUILD_TYPE" \
               cc="$CC" \
               ${CCL:+ccl="$CCL"} \
               cflags="$BASE_CFLAGS$ARCH_CFLAGS" \
               ${CL:+cl="$CL"} \
               dest_dir="$DEST_DIR" \
               exe="dbs26-${CC##*/}$EXT" \
               ${CCL:+exe_ccl="dbs26-${CCL##*/}$EXT"} \
               ${CL:+exe_cl="dbs26-${CL##*/}$EXT"} \
               ${MSVC:+msvc_bin="$GITHUB_WORKSPACE/$MSVC/sdk/bin/x64"} \
               ${MSVC:+msvc_dir="$GITHUB_WORKSPACE/$MSVC"} \
               ${MSVC:+msvc_sdk="$GITHUB_WORKSPACE/$MSVC/sdk"} \
               pkg="dbs26-$BUILD_JOB" \
               src="$SRC" >> "$GITHUB_OUTPUT"

        __step() {
          local x f y
          for x in pre_$1 $1 post_$1; do
            f="${x}_on_${{ runner.os }}"; y="${!f}"
            [[ -z "${y// /}" ]] || echo "$y"
            ${{ steps.id.outputs.cross && env.on_for || '' }}
            f="${x}_${{ env.BUILD_TYPE }}_${{ matrix.os }}"; y="${!f}"
            [[ -z "${y// /}" ]] || { echo "$y"; continue; }
            f="${x}_${{ env.BUILD_TYPE }}"; y="${!f}"
            [[ -z "${y// /}" ]] || { echo "$y"; continue; }
            y="${!x}"; [[ -z "${y// /}" ]] || echo "$y"
          done
        }
        #__fn="$(declare -f __step)"
        #if (( BASH_VERSINFO == 3 )); then
        #  __fn=$(printf 'eval %q' "$__fn")
        #fi
        for s in update depends compile validate; do
          __step "$s"
          {
            echo "$s<<EOF"
            __step "$s"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
        done

    - name: Update system packages
      env:
        update: ${{ steps.cfg.outputs.update }}
      run: |
        echo "$update"
        ${{ steps.cfg.outputs.update }}

    - uses: actions/checkout@v4

    - name: Clone msvc-wine
      if: ${{ steps.id.outputs.cross_Windows }}
      uses: actions/checkout@v4
      with:
        repository: mstorsjo/msvc-wine
        path: ${{ steps.cfg.outputs.msvc_dir }}
        ref: master

    - name: Install dependencies
      env:
        MSVC_DIR: ${{ steps.cfg.outputs.msvc_dir }}
        MSVC_SDK: ${{ steps.cfg.outputs.msvc_sdk }}
        depends: ${{ steps.cfg.outputs.depends }}
      run: |
        echo "$depends"
        ${{ steps.cfg.outputs.depends }}

    - name: Introspect compilers
      run: |
        set +e
        uname -a
        printf -- '\n+---------+\n|compilers|\n+---------+\n'
        . .github/workflows/functions.bash
        get_compilers
        declare -a cc_clang cc_gcc
        declare -A cc_v
        for _cc in "${compilers[@]}"; do
          v=$("$_cc" --version 2>&1 | head -1)
          case "$_cc" in
          clang*)
            cc_clang+=("$_cc") ;;
          gcc*)
            [[ ! "$v" =~ clang ]] || continue
            cc_gcc+=("$_cc") ;;
          esac
          cc_v["$_cc"]="$v"
        done
        n=$(printf '%s\n' "${cc_v[@]}" | wc -L)
        for _cc in "${cc_clang[@]}"; do
          printf "%-${n}s\t%s\n" "${cc_v[$_cc]}" "$_cc"
        done | tee compilers_clang
        for _cc in "${cc_gcc[@]}"; do
          printf "%-${n}s\t%s\n" "${cc_v[$_cc]}" "$_cc"
        done | tee compilers_gcc

    - name: Compile
      working-directory: ${{ github.workspace }}/src
      env:
        BUILD_DIR: ${{ steps.cfg.outputs.build_dir }}
        CC: ${{ steps.cfg.outputs.cc }}
        CCL: ${{ steps.cfg.outputs.ccl }}
        CL: ${{ steps.cfg.outputs.cl }}
        CFLAGS: ${{ steps.cfg.outputs.cflags }}
        EXE: ${{ steps.cfg.outputs.abs_exe }}
        EXE_CCL: ${{ steps.cfg.outputs.abs_exe_ccl }}
        EXE_CL: ${{ steps.cfg.outputs.abs_exe_cl }}
        MSVC_BIN: ${{ steps.cfg.outputs.msvc_bin }}
        MSVC_DIR: ${{ steps.cfg.outputs.msvc_dir }}
        MSVC_SDK: ${{ steps.cfg.outputs.msvc_sdk }}
        SRC: ${{ steps.cfg.outputs.src }}
        compile: ${{ steps.cfg.outputs.compile }}
      run: |
        echo "$compile"
        mkdir -p "$BUILD_DIR"
        ${{ steps.cfg.outputs.compile }}

    - name: Package
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.cfg.outputs.pkg }}
        path: |
          ${{ steps.cfg.outputs.abs_exe }}
          ${{ steps.cfg.outputs.abs_exe_ccl }}
          ${{ steps.cfg.outputs.abs_exe_cl }}

    - name: Validate
      working-directory: ${{ steps.cfg.outputs.build_dir }}
      env:
        EXE: ${{ steps.cfg.outputs.exe }}
        EXE_CCL: ${{ steps.cfg.outputs.exe_ccl }}
        EXE_CL: ${{ steps.cfg.outputs.exe_cl }}
        OUT: ${{ runner.temp }}/test.bin
      run: |
        ${{ steps.cfg.outputs.validate }}
