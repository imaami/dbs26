name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

defaults:
  run:
    shell: bash

jobs:
  build:
    name: ${{ matrix.os }} target on ${{ matrix.on }}
    runs-on: ${{ matrix.on }}
    strategy:
      fail-fast: false
      matrix:
        os: [ Linux, macOS, Windows ]
        on: [ ubuntu-24.04, macos-15, macos-14 ]
        exclude:
          - os: Linux
            on: macos-15
          - os: Linux
            on: macos-14
          - os: macOS
            on: ubuntu-24.04
    steps:
    - name: id
      id: id
      env:
        os_: ${{ matrix.os }}_
        _for_: ${{ matrix.os != runner.os && '_for_' || '' }}${{ matrix.os != runner.os && matrix.os || '' }}
        on_: ${{ matrix.os != runner.os && 'on_' || '' }}${{ matrix.os != runner.os && runner.os || '' }}
        _on_: ${{ matrix.os != runner.os && '=on_' || '' }}${{ matrix.os != runner.os && runner.os || '' }}
        type: ${{ matrix.os == runner.os && 'native' || 'cross' }}
        on_for: f="${x}_on_${{ runner.os }}_for_${{ matrix.os }}"; y="${!f}"; [[ -z "${y// /}" ]] || { echo "$y"; continue; }
      run: |
        __step() {
          local x f y
          for x in pre_$1 $1 post_$1; do
            f="${x}_on_${{ runner.os }}"; y="${!f}"; [[ -z "${y// /}" ]] || echo "$y"
            ${{ matrix.os != runner.os && env.on_for || '' }}
            f="${x}_${{ env.type }}_${{ matrix.os }}"; y="${!f}"; [[ -z "${y// /}" ]] || { echo "$y"; continue; }
            f="${x}_${{ env.type }}"; y="${!f}"; [[ -z "${y// /}" ]] || { echo "$y"; continue; }
            y="${!x}"; [[ -z "${y// /}" ]] || echo "$y"
          done
        }
        __fn="$(declare -f __step)"
        if (( BASH_VERSINFO == 3 )); then
          __fn=$(printf 'eval %q' "$__fn")
        fi
        for s in update depends compile validate; do
          fn="${__fn/__step/do_$s}"
          {
            echo "$s<<EOF"
            echo "${fn//\$1/$s}"
            echo "eval \"\$(do_$s)\""
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
        done

        printf '%s\n' \
               "on_$RUNNER_OS=on_$RUNNER_OS" \
               "for_${{ matrix.os }}=for_${{ matrix.os }}" \
               ${{ env.on_ }}${{ env._for_ }}${{ env._on_ }}${{ env._for_ }} \
               "build=${{ matrix.os != runner.os && env.os_ || '' }}${{ matrix.on }}" \
               "${{ env.type }}_${{ matrix.os }}=${{ env.type }}_${{ matrix.os }}" \
               "${{ env.type }}=${{ env.type }}" >> "$GITHUB_OUTPUT"

    - name: Set build params
      id: cfg
      env:
        pre_update_on_Linux_for_Windows: |
          ${{ steps.id.outputs.on_Linux_for_Windows && '
          sudo mkdir -pm755 /etc/apt/keyrings
          wget -qO- https://dl.winehq.org/wine-builds/winehq.key | \
          sudo gpg --dearmor -o /etc/apt/keyrings/winehq-archive.key -
          wget -qO- https://dl.winehq.org/wine-builds/ubuntu/dists/noble/winehq-noble.sources | \
          sudo tee /etc/apt/sources.list.d/winehq.sources
          sudo dpkg --add-architecture i386' || '' }}
        update_on_Linux: |
          ${{ steps.id.outputs.on_Linux && '
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble main" | \
          sudo tee /etc/apt/sources.list.d/apt.llvm.org.list
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | \
          sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo apt-get update
          sudo apt-get upgrade -y' || '' }}
        update_on_macOS: |
          ${{ steps.id.outputs.on_macOS && '
          brew update
          brew upgrade
          brew install bash' || '' }}
        pre_depends_on_Linux: |
          ${{ steps.id.outputs.on_Linux && '
          sudo apt-get install -y clang clang-21 lld lld-21 llvm-21-linker-tools' || '' }}
        pre_depends_on_Linux_for_Windows: |
          ${{ steps.id.outputs.on_Linux_for_Windows && '
          sudo apt-get install -y ca-certificates msitools python3 winbind winehq-staging' || '' }}
        pre_depends_on_macOS_for_Windows: |
          ${{ steps.id.outputs.on_macOS_for_Windows && '
          brew install msitools wine@staging' || '' }}
        depends_cross_Windows: |
          ${{ steps.id.outputs.cross_Windows && '
          mkdir -p "$msvc_sdk"
          "$msvc_dir/vsdownload.py" --accept-license --dest "$msvc_sdk"
          "$msvc_dir/install.sh" "$msvc_sdk"' || '' }}
        post_depends_on_macOS: |
          ${{ steps.id.outputs.on_macOS && '
          brew install coreutils gnu-sed
          P="$(brew --prefix)/opt"
          echo "$P/coreutils/libexec/gnubin:$P/gnu-sed/libexec/gnubin" >> "$GITHUB_PATH"' || '' }}
        post_depends_on_macOS_for_Windows: |
          ${{ steps.id.outputs.on_macOS_for_Windows && '
          brew install llvm lld binutils
          P="$(brew --prefix)/opt"
          echo "$P/llvm/bin:$P/opt/binutils/bin" >> "$GITHUB_PATH"' || '' }}
        compile_native_Linux: |
          "$CC" $CFLAGS -o "$BUILD_DIR/$EXE" $SRC
          strip --strip-all "$BUILD_DIR/$EXE"
        compile_native_macOS: |
          "$CC" -arch arm64 $CFLAGS -o "$BUILD_DIR/$EXE-arm64" $SRC
          "$CC" -arch x86_64 $CFLAGS -o "$BUILD_DIR/$EXE-x86_64" $SRC
          lipo -create -output "$BUILD_DIR/$EXE" "$BUILD_DIR/$EXE-arm64" "$BUILD_DIR/$EXE-x86_64"
        compile_cross_Windows: |
          BIN="$msvc_bin" . "$msvc_dir/msvcenv-native.sh"
          export PATH="$msvc_bin:$PATH"
          echo "\"$CC\" --target=$TARGET_TRIPLE $CFLAGS} -o \"$BUILD_DIR/$EXE\" $SRC"
          "$CC" --target=$TARGET_TRIPLE $CFLAGS -o "$BUILD_DIR/$EXE" $SRC
          echo "\"$CL\" /TC /std:clatest /experimental:c11atomics /DNDEBUG=1 /Wall /O2 /Oi /GL /GF /Zo- /MT /Fe: \"$BUILD_DIR/$EXE_CL\" $SRC"
          "$CL" /TC /std:clatest /experimental:c11atomics /DNDEBUG=1 /Wall /O2 /Oi /GL /GF /Zo- /MT /nologo /Fe: "$BUILD_DIR/$EXE_CL" $SRC
        post_compile_on_Linux_for_Windows: |
          echo "\"$CCL\" /TC /DNDEBUG=1 /Wall /O2 /Oi /GF /Zo- /MT /Fe: \"$BUILD_DIR/$EXE_CCL\" -fuse-ld=lld $SRC"
          "$CCL" /TC /DNDEBUG=1 /Wall /O2 /Oi /GF /Zo- /MT /Fe: "$BUILD_DIR/$EXE_CCL" -fuse-ld=lld --nologo $SRC
        pre_validate_on_macOS_for_Windows: |
          ${{ steps.id.outputs.on_macOS_for_Windows && 'try() {
            WINEDEBUG=-all wine "$@" -o -     | sha1sum       ; rm -f "$out"
            WINEDEBUG=-all wine "$@" -o "$out"; sha1sum "$out"; rm -f "$out"
          }' || '' }}
        pre_validate_cross_Windows: |
          ${{ steps.id.outputs.cross_Windows && 'try() {
            WINEDEBUG=-all wine64 "$@" -o -     | sha1sum       ; rm -f "$out"
            WINEDEBUG=-all wine64 "$@" -o "$out"; sha1sum "$out"; rm -f "$out"
          }' || '' }}
        pre_validate_native: |
          ${{ steps.id.outputs.native && 'try() {
            "$@" -o -     | sha1sum       ; rm -f "$out"
            "$@" -o "$out"; sha1sum "$out"; rm -f "$out"
          }' || '' }}
        validate_native_Linux: |
          ${{ steps.id.outputs.native_Linux && '
          try "./$EXE"' || '' }}
        validate_native_macOS: |
          ${{ steps.id.outputs.native_macOS && '
          try arch -arm64 "./$EXE"
          try arch -x86_64 "./$EXE"' || '' }}
        validate_cross_Windows: |
          ${{ steps.id.outputs.cross_Windows && '
          try "./$EXE"
          try "./$EXE_CL"' || '' }}
        post_validate_on_Linux_for_Windows: |
          ${{ steps.id.outputs.on_Linux_for_Windows && '
          try "./$EXE_CCL"' || '' }}
        ARCH_CFLAGS: ${{ ! steps.id.outputs.for_macOS && ' -fuse-ld=lld' || '' }}${{ steps.id.outputs.for_Linux && ' -march=x86-64-v3 -mtune=znver3' || '' }}
        BASE_CFLAGS: -std=gnu2${{ steps.id.outputs.on_macOS && 'x' || '3' }} -flto=full -O3 -Wall -Wextra -Wpedantic -Weverything -DNDEBUG=1
        BUILD_ID: ${{ steps.id.outputs.build }}
        CC: ${{ steps.id.outputs.on_macOS && 'clang' || 'clang-21' }}
        CCL: ${{ steps.id.outputs.on_Linux_for_Windows && 'clang-cl-21' || '' }}
        CL: ${{ steps.id.outputs.for_Windows && 'cl' || '' }}
        EXT: ${{ steps.id.outputs.for_Windows && '.exe' || '' }}
      run: |
        printf '%s\n' \
               cc="$CC" exe="dbs26-${CC##*/}$EXT"} \
               ${CL:+cl="$CL" +exe_cl="dbs26-${CL##*/}$EXT"} \
               ${CCL:+ccl="$CCL"} exe_ccl="dbs26-${CCL##*/}$EXT"} \
               cflags="$BASE_CFLAGS$ARCH_CFLAGS" \
               pkg="dbs26-$BUILD_ID" \
               src="args.c dbs26.c" >> "$GITHUB_OUTPUT"
    - name: Update system packages
      env:
      run: |
        ${{ steps.id.outputs.update }}

    - name: Set env variables
      id: env
      run: |
        ${{ steps.id.outputs.cross_Windows && '
        [[ "$msvc_path" ]] || msvc_path="msvc"
        [[ "$msvc_dir"  ]] || msvc_dir="$GITHUB_WORKSPACE/$msvc_path"
        [[ "$msvc_sdk"  ]] || msvc_sdk="$msvc_dir/sdk"
        printf "%s=%s\n" \
               msvc_dir "$msvc_dir" \
               msvc_sdk "$msvc_sdk" \
               msvc_bin "$msvc_sdk/bin/x64" >> "$GITHUB_OUTPUT"
        ' || '' }}
        [[ "$build_dir" ]] || build_dir="$GITHUB_WORKSPACE/build"
        printf "%s=%s\n" \
               build_dir "$build_dir" \
               artifacts "$build_dir/${{ steps.cfg.outputs.exe }}${{ steps.cfg.outputs.exe_cl && ' $build_dir/' || '' }}${{ steps.cfg.outputs.exe_cl }}${{ steps.cfg.outputs.exe_ccl && ' $build_dir/' || '' }}${{ steps.cfg.outputs.exe_ccl }}" >> "$GITHUB_OUTPUT"

    - uses: actions/checkout@v4

    - name: Clone msvc-wine
      if: ${{ steps.id.outputs.cross_Windows }}
      uses: actions/checkout@v4
      with:
        repository: mstorsjo/msvc-wine
        path: ${{ steps.env.outputs.msvc_dir }}
        ref: master

    - name: Install dependencies
      env:
        msvc_dir: ${{ steps.env.outputs.msvc_dir }}
        msvc_sdk: ${{ steps.env.outputs.msvc_sdk }}
      run: |
        ${{ steps.id.outputs.depends }}

    - name: Introspect compilers
      run: |
        set +e
        uname -a
        printf -- '\n+---------+\n|compilers|\n+---------+\n'
        . .github/workflows/functions.bash
        get_compilers
        declare -a cc_clang cc_gcc
        declare -A cc_v
        for _cc in "${compilers[@]}"; do
          v=$("$_cc" --version 2>&1 | head -1)
          case "$_cc" in
          clang*)
            cc_clang+=("$_cc") ;;
          gcc*)
            [[ ! "$v" =~ clang ]] || continue
            cc_gcc+=("$_cc") ;;
          esac
          cc_v["$_cc"]="$v"
        done
        n=$(printf '%s\n' "${cc_v[@]}" | wc -L)
        for _cc in "${cc_clang[@]}"; do
          printf "%-${n}s\t%s\n" "${cc_v[$_cc]}" "$_cc"
        done | tee compilers_clang
        for _cc in "${cc_gcc[@]}"; do
          printf "%-${n}s\t%s\n" "${cc_v[$_cc]}" "$_cc"
        done | tee compilers_gcc

    - name: Compile
      working-directory: ${{ github.workspace }}/src
      env:
        BUILD_DIR: ${{ steps.env.outputs.build_dir }}
      run: |
        mkdir -p "$BUILD_DIR"
        ${{ steps.id.outputs.compile }}

    - name: Package
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.cfg.outputs.pkg }}
        path: |
          ${{ steps.env.outputs.artifacts }}
          LICENSE
          README.md

    - name: Validate
      working-directory: ${{ steps.env.outputs.build_dir }}
      env:
        EXE: ${{ steps.cfg.outputs.exe }}
        EXE_CCL: ${{ steps.cfg.outputs.exe_ccl }}
        EXE_CL: ${{ steps.cfg.outputs.exe_cl }}
        OUT: ${{ runner.temp }}/test.bin
      run: |
        ${{ steps.id.outputs.validate }}
